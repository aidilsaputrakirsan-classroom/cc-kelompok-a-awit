server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    charset utf-8;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression for text-based assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # SPA routing: rewrite unknown routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for production
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|eot|ttf|otf|json|xml)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Disable caching for index.html so client always gets the latest app shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Custom error pages
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    location = /errors/404.html {
        internal;
    }

    location = /errors/50x.html {
        internal;
    }
}