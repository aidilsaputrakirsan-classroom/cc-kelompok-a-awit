upstream backend_service { server backend:8000; }
upstream frontend_service { server frontend:80; }

server {
    listen 80;

    # 1. Health Check — proxy ke backend
    location /health {
        proxy_pass http://backend_service/health;
        proxy_set_header Host $host;
    }

    # 2. Auth routes — /auth/* → backend /auth/*
    location /auth/ {
        proxy_pass http://backend_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. API routes — /api/* → backend (strip /api/ prefix)
    #    Contoh: /api/vendors → backend /api/vendors
    location /api/ {
        proxy_pass http://backend_service/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Items route (legacy, tanpa /api prefix)
    location /items {
        proxy_pass http://backend_service/items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 5. Docs (Swagger)
    location /docs {
        proxy_pass http://backend_service/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend_service/openapi.json;
        proxy_set_header Host $host;
    }

    # 6. Team info
    location /team {
        proxy_pass http://backend_service/team;
        proxy_set_header Host $host;
    }

    # 7. Frontend Route (Fallback — paling bawah)
    location / {
        proxy_pass http://frontend_service;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}