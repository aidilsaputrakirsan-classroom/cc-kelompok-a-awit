version: '3.8'

# Docker Compose untuk 3-container architecture:
# - PostgreSQL database
# - FastAPI backend
# - Nginx frontend (dari React build)

services:
  # ============================================================
  # Database Service
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: cloudapp
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    networks:
      - cloudnet
    volumes:
      # Named volume untuk persistent data
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Cek database setiap 5 detik
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # Backend Service (FastAPI)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      # Database connection — gunakan hostname 'db' (nama service)
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/cloudapp
      
      # JWT configuration
      SECRET_KEY: your-secret-key-here-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      
      # CORS configuration
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://frontend
    ports:
      - "8000:8000"
    networks:
      - cloudnet
    depends_on:
      # Wait for database service to be healthy
      db:
        condition: service_healthy
    healthcheck:
      # Check backend health setiap 10 detik
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # Backend akan tunggu database ready via wait-for-db.sh script

  # ============================================================
  # Frontend Service (Nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - cloudnet
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Environment bisa di-pass ke Nginx config jika diperlukan

# ============================================================
# Networks
# ============================================================
networks:
  cloudnet:
    driver: bridge
    # Memungkinkan container saling berkomunikasi dengan hostname

# ============================================================
# Volumes
# ============================================================
volumes:
  pgdata:
    driver: local
    # Named volume untuk menyimpan data PostgreSQL persistent
