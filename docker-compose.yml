version: '3.8'

# ============================================================
# Docker Compose — Arsitektur Microservices (6-Container)
# Proyek: PalmTrack Cloud — PalmChain
# Peran: Lead DevOps (Varrel)
# ============================================================

services:
  # ============================================================
  # DATABASES (Database per Service)
  # ============================================================
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: auth_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    networks:
      - cloudnet
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  item-db:
    image: postgres:16-alpine
    container_name: item-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: item_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    networks:
      - cloudnet
    volumes:
      - item_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # BACKEND MICROSERVICES
  # ============================================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@auth-db:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      CORS_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:3000"
    networks:
      - cloudnet
    depends_on:
      auth-db:
        condition: service_healthy
    # ── [TUGAS DEVOPS: HEALTHCHECK AUTH SERVICE] ──
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').getcode()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  item-service:
    build:
      context: ./services/item-service
      dockerfile: Dockerfile
    container_name: item-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@item-db:5432/item_db
      AUTH_SERVICE_URL: http://auth-service:8001
      CORS_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:3000"
    networks:
      - cloudnet
    depends_on:
      item-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    # ── [TUGAS DEVOPS: HEALTHCHECK ITEM SERVICE] ──
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').getcode()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ============================================================
  # FRONTEND SERVICE
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - cloudnet
    restart: unless-stopped

  # ============================================================
  # API GATEWAY (Pintu Masuk Utama Tunggal)
  # ============================================================
  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # ── [TUGAS DEVOPS: MENGUNCI URUTAN NYALA GATEWAY] ──
    depends_on:
      auth-service:
        condition: service_healthy
      item-service:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

# ============================================================
# Networks & Volumes Configuration
# ============================================================
networks:
  cloudnet:
    driver: bridge

volumes:
  auth_db_data:
    driver: local
  item_db_data:
    driver: local