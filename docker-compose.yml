# =====================================================================
# Docker Compose — Monolith Architecture (Matching DeployCC Production)
# Proyek: PalmTrack Cloud — PalmChain
# =====================================================================

services:
  # ============================================================
  # DATABASE (Single PostgreSQL — sama seperti production)
  # ============================================================
  db:
    image: postgres:16-alpine
    container_name: palmchain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: palmchain
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    networks:
      - cloudnet
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ============================================================
  # BACKEND MONOLITH (Sama persis dengan DeployCC production)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/palmchain
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALLOWED_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:3000,http://localhost:8080"
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').getcode()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "backend"

  # ============================================================
  # FRONTEND SERVICE (Tetap sama)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - cloudnet
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ============================================================
  # API GATEWAY (Route ke backend monolith)
  # ============================================================
  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/gateway.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cloudnet
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# ============================================================
# Networks & Volumes Configuration
# ============================================================
networks:
  cloudnet:
    driver: bridge

volumes:
  db_data:
    driver: local