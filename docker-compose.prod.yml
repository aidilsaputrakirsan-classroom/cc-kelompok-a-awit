# Production overrides — gunakan dengan:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - CORS_ORIGINS=${PROD_CORS_ORIGINS}
    restart: unless-stopped

  frontend:
    restart: unless-stopped

  db:
    restart: unless-stopped
    # Tidak expose port ke host di production demi keamanan
    ports: !reset []
    